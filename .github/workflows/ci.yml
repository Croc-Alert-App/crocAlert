name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Shared KMP module (pure Kotlin, fast) ─────────────────────────────────
  test-shared:
    name: Shared Module Tests (KMP/JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Run shared module tests (JVM)
        run: ./gradlew :shared:jvmTest --no-daemon --continue

      - name: Upload shared test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-test-report
          path: shared/build/reports/tests/
          retention-days: 14

  # ── Server module (Ktor routes + business logic) ──────────────────────────
  test-server:
    name: Server Tests (Ktor)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Run server tests
        run: ./gradlew :server:test --no-daemon --continue

      - name: Upload server test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-report
          path: server/build/reports/tests/
          retention-days: 14

  # ── ComposeApp — ViewModel + presentation layer (R-07 fix) ───────────────
  test-compose:
    name: ComposeApp Tests (KMP/JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Run composeApp tests (JVM target)
        run: ./gradlew :composeApp:jvmTest --no-daemon --continue

      - name: Upload composeApp test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-test-report
          path: composeApp/build/reports/tests/
          retention-days: 14

  # ── Android host-side unit tests (no emulator required) ──────────────────
  test-android-unit:
    name: Android Unit Tests (host)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Write google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::Secret GOOGLE_SERVICES_JSON is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > androidApp/google-services.json

      - name: Run Android host unit tests
        run: ./gradlew :androidApp:testDebugUnitTest --no-daemon --continue

      - name: Upload Android unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-report
          path: androidApp/build/reports/tests/
          retention-days: 14

  # ── Coverage verification (Kover 70% gate) ───────────────────────────────
  coverage-verify:
    name: Coverage Gate (Kover ≥70%)
    needs: [ test-shared, test-compose ]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Verify coverage thresholds
        run: ./gradlew :shared:koverVerify :composeApp:koverVerify --no-daemon

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-coverage-report
          path: |
            shared/build/reports/kover/
            composeApp/build/reports/kover/
          retention-days: 14

  # ── Merge gate: all required jobs must pass before PR can merge ───────────
  all-tests-pass:
    name: All Tests Pass
    needs: [ test-shared, test-server, test-compose, test-android-unit, coverage-verify ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.test-shared.result }}" != "success" || \
                "${{ needs.test-server.result }}" != "success" || \
                "${{ needs.test-compose.result }}" != "success" || \
                "${{ needs.test-android-unit.result }}" != "success" || \
                "${{ needs.coverage-verify.result }}" != "success" ]]; then
            echo "One or more test jobs failed:"
            echo "  shared:       ${{ needs.test-shared.result }}"
            echo "  server:       ${{ needs.test-server.result }}"
            echo "  compose:      ${{ needs.test-compose.result }}"
            echo "  android-unit: ${{ needs.test-android-unit.result }}"
            echo "  coverage:     ${{ needs.coverage-verify.result }}"
            exit 1
          fi
          echo "All test jobs passed — safe to merge."
